<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>UPDATE MAIL PRO - KIẾM NHIỀU TIỀN ĐẠT NHÁ</title>
<style>
body{font-family:Arial;background:#eef2f5;max-width:760px;margin:auto;padding:16px}
.card{background:#fff;border-radius:12px;padding:16px;margin:12px 0}
.row{display:flex;gap:8px;align-items:flex-start;margin:10px 0}
.grow{flex:1}
input,textarea{width:100%;box-sizing:border-box;padding:10px;border:1px solid #ccc;border-radius:8px}
button{background:#1677ff;color:#fff;border:0;border-radius:8px;padding:10px 14px;cursor:pointer}
.used{color:green;font-weight:bold}
.linkbox{border:1px solid #ddd;border-radius:10px;padding:10px;margin:10px 0}
summary{cursor:pointer;font-weight:bold}
</style>
</head>
<body>

<div class="card">
<h2>Android Setup Hub (15 Mails)</h2>
<div id="cnt"></div>
<div id="emails"></div>
</div>

<div class="card">
<h3>📥 Cập nhật mail</h3>
<textarea id="bulk" rows="8" placeholder="email@abc.us|password (Tối đa 15 dòng)"></textarea><br><br>
<button id="btn-update">Cập nhật Mail</button>
<button id="btn-reset">Reset</button>
</div>

<div class="card">
<h3>🔑 Password chung</h3>
<input id="pwd" placeholder="Password chung">
<br><br>
<button id="btn-copy-pwd">📋 Copy Password</button>
</div>

<div class="card">
<details>
<summary>🔗 8 Link nhanh</summary>
<div id="linksContainer"></div>
</details>
</div>

<div class="card">
<h3>📝 Ghi chú</h3>
<textarea id="note" rows="5"></textarea>
</div>

<!-- Nhúng Firebase SDK sử dụng ES Modules từ CDN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// Cấu hình Firebase thực tế của dự án meobzk của bạn
const firebaseConfig = {
    apiKey: "AIzaSyAXwW5V-Yfs4wVFZpM7Z2uKJQjl_BC5tHw",
    authDomain: "meobzk.firebaseapp.com",
    databaseURL: "https://meobzk-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "meobzk",
    storageBucket: "meobzk.appspot.com",
    messagingSenderId: "226897249765",
    appId: "1:226897249765:web:1800a362b02e6d690a1b0c"
};

// Khởi tạo Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
// Thay đổi đường dẫn lưu trữ thành 'dat' để tách biệt dữ liệu hoàn toàn
const hubRef = ref(db, 'dat');

let mails = [];
let used = [];
let links = [];

// 1. Lắng nghe dữ liệu trực tiếp theo thời gian thực từ Firebase
onValue(hubRef, (snapshot) => {
    const data = snapshot.val() || {};

    // Khởi tạo giá trị mặc định cho 15 Mail nếu database trống
    mails = data.mails || Array(15).fill("");
    used = data.used || Array(15).fill(false);
    links = data.links || Array.from({length: 8}, (_, i) => ({name: "Link " + (i+1), url: ""}));

    // Tránh ghi đè khi đang gõ phím
    if (document.activeElement !== pwd) {
        pwd.value = data.pwd || "";
    }
    if (document.activeElement !== note) {
        note.value = data.note || "";
    }

    renderEmails();

    // Tránh mất con trỏ khi chỉnh sửa Links
    const activeEl = document.activeElement;
    const isEditingLinks = activeEl && activeEl.tagName === "INPUT" && activeEl.closest(".linkbox");
    if (!isEditingLinks) {
        renderLinks();
    }
});

// 2. Các hàm lưu dữ liệu trực tiếp lên Firebase
function saveMail() {
    update(hubRef, { mails, used });
}

function saveLinks() {
    update(hubRef, { links });
}

pwd.oninput = () => {
    update(hubRef, { pwd: pwd.value });
};

note.oninput = () => {
    update(hubRef, { note: note.value });
};

// 3. Render giao diện Email (Nâng lên 15 Mail)
function renderEmails(){
    cnt.textContent = "Đã dùng: " + used.filter(x=>x).length + "/15";
    emails.innerHTML = "";
    for(let i=0; i<15; i++){
        let r = document.createElement("div");
        r.className = "row";
        let d = document.createElement("div");
        d.className = "grow";
        d.innerHTML = "<b>Mail " + (i+1) + "</b><br>" + (mails[i] || "(trống)") + (used[i] ? " <span class='used'>✅ Đã dùng</span>" : "");
        let b = document.createElement("button");
        b.textContent = "📋 Copy";
        b.onclick = () => {
            if(mails[i]) navigator.clipboard.writeText(mails[i]);
            used[i] = !used[i];
            saveMail();
        };
        r.append(d, b);
        emails.appendChild(r);
    }
}

// 4. Render giao diện Links nhanh
function renderLinks(){
    const c = document.getElementById("linksContainer");
    c.innerHTML = "";
    links.forEach((item, index) => {
        const box = document.createElement("div");
        box.className = "linkbox";

        const name = document.createElement("input");
        name.placeholder = "Tên";
        name.value = item.name;
        name.addEventListener("input", e => {
            links[index].name = e.target.value;
            saveLinks();
        });

        const url = document.createElement("input");
        url.placeholder = "URL";
        url.style.marginTop = "8px";
        url.value = item.url;
        url.addEventListener("input", e => {
            links[index].url = e.target.value;
            saveLinks();
        });

        const btn = document.createElement("button");
        btn.style.marginTop = "8px";
        btn.textContent = "Mở";
        btn.onclick = () => {
            if(links[index].url.trim()){
                window.open(links[index].url, "_blank");
            }
        };

        box.appendChild(name);
        box.appendChild(url);
        box.appendChild(btn);
        c.appendChild(box);
    });
}

// 5. Cập nhật hàng loạt (Nâng lên tối đa 15 dòng)
document.getElementById("btn-update").onclick = () => {
    let arr = bulk.value.trim().split(/\n+/).filter(Boolean).slice(0, 15).map(v => v.split("|")[0].trim());
    while(arr.length < 15) arr.push("");
    mails = arr;
    used = Array(15).fill(false);
    saveMail();
    bulk.value = "";
};

document.getElementById("btn-reset").onclick = () => {
    used = Array(15).fill(false);
    saveMail();
};

document.getElementById("btn-copy-pwd").onclick = () => {
    navigator.clipboard.writeText(pwd.value);
};
</script>

</body>
</html>
